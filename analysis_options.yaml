include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Loam soll an sich selbst streng sein.
    todo: ignore

linter:
  rules:
    - prefer_final_locals
    - prefer_single_quotes
    - directives_ordering
    - unawaited_futures
