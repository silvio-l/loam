name: Deploy website

# Baut die statische Astro-Website unter web/ reproduzierbar aus der Quelle und
# deployt sie als Production zum Cloudflare-Pages-Projekt `loam` (getloam.dev).
# dist/ ist gitignored — die Single Source of Truth ist immer web/src. Damit ist
# jeder Push auf main, der web/ berührt, automatisch live; kein manueller Upload,
# kein stale Deploy mehr.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

permissions:
  contents: read

# Nie zwei Deploys parallel; ein neuerer Push überholt einen laufenden.
concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=loam --branch=main

      # IndexNow: Bing/Yandex über die deployten URLs informieren (near-real-time
      # Re-Indexierung). Key-Datei liegt unter web/public/<key>.txt und wird mit
      # deployt; der POST ist idempotent. Non-fatal — ein Submit-Fehler darf den
      # Deploy nie kippen. Kein GitHub-Secret nötig (der IndexNow-Key ist public).
      - name: Notify IndexNow
        continue-on-error: true
        run: |
          curl -fsS -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json' \
            -d '{
              "host": "getloam.dev",
              "key": "3e158f9fc05348f19a87e5161b355ca4",
              "keyLocation": "https://getloam.dev/3e158f9fc05348f19a87e5161b355ca4.txt",
              "urlList": [
                "https://getloam.dev/",
                "https://getloam.dev/how-it-works/",
                "https://getloam.dev/rules/",
                "https://getloam.dev/developer-guide/",
                "https://getloam.dev/privacy/",
                "https://getloam.dev/de/",
                "https://getloam.dev/de/how-it-works/",
                "https://getloam.dev/de/rules/",
                "https://getloam.dev/de/developer-guide/",
                "https://getloam.dev/de/privacy/"
              ]
            }' && echo "IndexNow: submitted" || echo "IndexNow: submission failed (non-fatal)"
