name: Docs drift (soft check)

# ADVISORY semantic-drift check for the public docs. Complements the
# deterministic Public-Docs-QS gate (tool/docs-attest.sh), which is the HARD
# gate enforced in the QA workflow + git hooks. This one asks a cheap LLM
# (Haiku) whether the prose/examples still match the implementation — the
# staleness the structural gate can't see.
#
# Uses the maintainer's Claude SUBSCRIPTION via the `claude` CLI and a
# CLAUDE_CODE_OAUTH_TOKEN secret (generate it locally with `claude setup-token`,
# which requires a Claude subscription). NOT the pay-per-token Anthropic API —
# no ANTHROPIC_API_KEY involved.
#
# NON-BLOCKING by design: it writes its report to the job summary and never
# fails the build (an LLM is advisory, not a deterministic gate). Runs at
# release time (every v* tag) and on demand — not per push, to stay cheap.
#
# Without the secret it is a clean no-op (writes a "skipped" note), so this
# workflow is safe to have in place before the token is configured.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Gate on subscription token
        id: gate
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Docs-drift soft-check (advisory)"
              echo ""
              echo "_Skipped: \`CLAUDE_CODE_OAUTH_TOKEN\` secret not set._"
              echo ""
              echo "Generate one with \`claude setup-token\` (uses your Claude"
              echo "subscription, no API key) and add it to the repo secrets."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        if: steps.gate.outputs.run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run docs-drift soft check (advisory)
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          report="$(tool/docs-drift.sh --llm 2>/dev/null || echo '(docs-drift returned non-zero — see step logs)')"
          {
            echo "## Docs-drift soft-check (advisory)"
            echo ""
            echo "Ground truth vs. public docs — semantic drift the deterministic"
            echo "Public-Docs-QS gate can't catch. Advisory only; does not block."
            echo ""
            echo "$report"
          } >> "$GITHUB_STEP_SUMMARY"
