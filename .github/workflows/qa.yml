name: QA

# Qualitäts-Gate für loam selbst: Format, Analyze, Tests (inkl. Self-Dogfooding)
# und das loam-Dogfood-Gate (loam prüft loam). Läuft bei jedem Push auf dev/main,
# manuell, UND wöchentlich (Cron) als regelmäßige Regressions-/SDK-Drift-Erkennung.
# Free-Tier-freundlich: ein einzelner ubuntu-Job, wenige Minuten.

on:
  push:
    branches: [dev, main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # montags 06:00 UTC

permissions:
  contents: read

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/loam_cli
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1

      - name: dart pub get
        run: dart pub get

      # Die test/fixtures/* sind eigenständige Mini-Pakete mit package:-Selbst-
      # importen. Im frischen CI-Checkout fehlt ihr package_config -> sonst
      # uri_does_not_exist beim Analyze und unauflösbare Imports in den Fixture-
      # ladenden Tests. Lokal sind sie längst aufgelöst.
      - name: Resolve fixture packages
        run: |
          for d in test/fixtures/*/; do
            [ -f "${d}pubspec.yaml" ] || continue
            echo "pub get: $d"
            ( cd "$d" && dart pub get ) || echo "  (übersprungen: $d)"
          done

      - name: Format
        run: dart format --output=none --set-exit-if-changed bin lib test

      - name: Analyze
        run: dart analyze --fatal-infos --fatal-warnings

      # Expliziter, sichtbarer Public-Docs-QS-Gate (deterministisch, 0 Token).
      # Läuft ohnehin im dart-test-Gate (test/readme_qa_test.dart), hier aber als
      # eigener Step: failt schneller und macht die vollständige Ausführung (alle
      # check_*-Funktionen inkl. shipped-status) unmissverständlich sichtbar.
      - name: Public-Docs-QS (docs-attest check)
        run: bash ../../tool/docs-attest.sh check

      - name: Test (inkl. Self-Dogfooding + Public-Docs-QS)
        run: dart test

      - name: Dogfood-Gate — loam prüft loam
        run: dart run bin/loam.dart gate --absolute --project-root .
