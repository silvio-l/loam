name: Release

# Baut bei jedem Versions-Tag (v*) die loam-Binaries nativ je Plattform,
# hängt sie als Assets an das GitHub-Release und aktualisiert die Homebrew-Formula
# im Tap-Repo silvio-l/homebrew-loam. Dart kann NICHT nach macOS cross-compilen,
# darum baut jede macOS-Architektur auf ihrem eigenen Runner. Der erste Build
# gegen einen bereits existierenden Tag ist via workflow_dispatch auslösbar.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existierender Tag, gegen den gebaut/released wird (z. B. v0.1.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14        # Apple Silicon (arm64)
            asset: loam-macos-arm64.tar.gz
          - runner: ubuntu-latest   # Linux x86_64
            asset: loam-linux-x86_64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: dart-lang/setup-dart@v1

      - name: dart pub get
        working-directory: packages/loam_cli
        run: dart pub get

      - name: Compile native binary
        working-directory: packages/loam_cli
        run: |
          mkdir -p dist
          dart compile exe bin/loam.dart -o dist/loam

      - name: Package + checksum
        working-directory: packages/loam_cli/dist
        run: |
          tar czf "${{ matrix.asset }}" loam
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" | awk '{print $1}' > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" | awk '{print $1}' > "${{ matrix.asset }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.asset }}
          path: |
            packages/loam_cli/dist/${{ matrix.asset }}
            packages/loam_cli/dist/${{ matrix.asset }}.sha256

  publish:
    name: Release + update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6   # nur für tool/homebrew/loam.rb.tmpl

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artifacts/*.tar.gz

      - name: Render formula + commit to tap (Contents API)
        env:
          # Fine-grained PATs werden von Git-über-HTTPS-Basic-Auth abgelehnt
          # („password authentication is not supported"), funktionieren aber
          # als Bearer-Token gegen die REST-API. Darum Datei via Contents-API
          # schreiben statt git clone + push.
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          REPO="silvio-l/homebrew-loam"
          FORMULA_PATH="Formula/loam.rb"
          sha() { tr -d '[:space:]' < "artifacts/$1.sha256"; }

          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__SHA_MACOS_ARM64__|$(sha loam-macos-arm64.tar.gz)|g" \
            -e "s|__SHA_LINUX_X86_64__|$(sha loam-linux-x86_64.tar.gz)|g" \
            tool/homebrew/loam.rb.tmpl > loam.rb

          content_b64="$(base64 -w0 loam.rb)"
          # Bei Update den Blob-SHA der bestehenden Datei mitgeben; bei Erst-Anlage leer.
          existing_sha="$(gh api "repos/${REPO}/contents/${FORMULA_PATH}" --jq .sha 2>/dev/null || true)"

          args=(--method PUT "repos/${REPO}/contents/${FORMULA_PATH}"
                -f "message=chore(formula): loam ${VERSION}"
                -f "content=${content_b64}"
                -f "committer[name]=github-actions[bot]"
                -f "committer[email]=41898282+github-actions[bot]@users.noreply.github.com")
          [ -n "${existing_sha}" ] && args+=(-f "sha=${existing_sha}")

          gh api "${args[@]}" --jq '.commit.sha' \
            | sed 's/^/Formula committed to tap: /'

  pub-dev:
    name: Publish to pub.dev (OIDC)
    needs: build
    runs-on: ubuntu-latest
    # Job-Level-permissions ERSETZEN die Top-Level-Defaults: id-token fürs
    # OIDC-Publishing, contents:read fürs checkout. Kein pub.dev-Secret nötig —
    # pub.dev vertraut dem OIDC-Token des getaggten Runs (Automated Publishing
    # muss am Paket aktiviert sein: Repo silvio-l/loam, Tag-Pattern v{{version}}).
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: dart-lang/setup-dart@v1

      - name: dart pub get
        working-directory: packages/loam_cli
        run: dart pub get

      # dart pub publish nutzt in GitHub Actions mit id-token:write automatisch
      # den OIDC-Token. --force überspringt die interaktive Bestätigung. Läuft der
      # Job gegen eine bereits publizierte Version (Re-Tag/Re-Run), schlägt pub.dev
      # bewusst mit "version already exists" fehl.
      - name: Publish to pub.dev
        working-directory: packages/loam_cli
        run: dart pub publish --force
