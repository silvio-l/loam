name: Release

# Baut bei jedem Versions-Tag (v*) die loam-Binaries nativ je Plattform,
# hängt sie als Assets an das GitHub-Release und aktualisiert die Homebrew-Formula
# im Tap-Repo silvio-l/homebrew-loam. Dart kann NICHT nach macOS cross-compilen,
# darum baut jede macOS-Architektur auf ihrem eigenen Runner. Der erste Build
# gegen einen bereits existierenden Tag ist via workflow_dispatch auslösbar.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existierender Tag, gegen den gebaut/released wird (z. B. v0.1.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14        # Apple Silicon (arm64)
            asset: loam-macos-arm64.tar.gz
          - runner: macos-13        # Intel (x86_64)
            asset: loam-macos-x86_64.tar.gz
          - runner: ubuntu-latest   # Linux x86_64
            asset: loam-linux-x86_64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: dart-lang/setup-dart@v1

      - name: dart pub get
        working-directory: packages/loam_cli
        run: dart pub get

      - name: Compile native binary
        working-directory: packages/loam_cli
        run: |
          mkdir -p dist
          dart compile exe bin/loam.dart -o dist/loam

      - name: Package + checksum
        working-directory: packages/loam_cli/dist
        run: |
          tar czf "${{ matrix.asset }}" loam
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" | awk '{print $1}' > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" | awk '{print $1}' > "${{ matrix.asset }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.asset }}
          path: |
            packages/loam_cli/dist/${{ matrix.asset }}
            packages/loam_cli/dist/${{ matrix.asset }}.sha256

  publish:
    name: Release + update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # nur für tool/homebrew/loam.rb.tmpl

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artifacts/*.tar.gz

      - name: Render formula + push to tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          sha() { tr -d '[:space:]' < "artifacts/$1.sha256"; }

          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__SHA_MACOS_ARM64__|$(sha loam-macos-arm64.tar.gz)|g" \
            -e "s|__SHA_MACOS_X86_64__|$(sha loam-macos-x86_64.tar.gz)|g" \
            -e "s|__SHA_LINUX_X86_64__|$(sha loam-linux-x86_64.tar.gz)|g" \
            tool/homebrew/loam.rb.tmpl > loam.rb

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/silvio-l/homebrew-loam.git" tap
          mkdir -p tap/Formula
          cp loam.rb tap/Formula/loam.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/loam.rb; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git add Formula/loam.rb
          git commit -m "chore(formula): loam ${VERSION}"
          git push
