version: 0.1.6
repository: https://github.com/silvio-l/loam
homepage: https://getloam.dev

environment:
  sdk: ^3.11.0

executables:
  loam: loam
dependencies:
  analyzer: ^13.0.0
  args: ^2.7.0
  crypto: ^3.0.0
  glob: ^2.1.2
  path: ^1.9.0
  pub_semver: ^2.1.4
  yaml: ^3.1.3
dev_dependencies:
  json_schema: ^5.2.2
  lints: ^6.1.0
  test: ^1.31.1
