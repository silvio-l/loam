include: package:lints/recommended.yaml

analyzer:
  exclude:
    # broken_fixture intentionally contains semantic errors to test the
    # ProjectLoader error path. Excluded so dart analyze on loam_cli stays green.
    - test/fixtures/broken_fixture/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # loam.dev soll an sich selbst streng sein.
    todo: ignore

linter:
  rules:
    - prefer_final_locals
    - prefer_single_quotes
    - directives_ordering
    - unawaited_futures
    - public_member_api_docs
